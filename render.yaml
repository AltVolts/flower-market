services:
  - type: web
    name: flower-shop-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: FRONTEND_URL
        sync: false

  - type: static
    name: flower-shop-frontend
    runtime: static
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
